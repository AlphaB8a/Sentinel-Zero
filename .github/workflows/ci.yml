name: CI
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: ./scripts/gates/state_intake_gate.sh
      - run: ./scripts/gates/state_intake_negative_gate.sh
      - run: cargo build --workspace
      - run: cargo test --workspace
      - run: cargo clippy --workspace -- -D warnings
      - run: ./scripts/gates/ipc_abuse_gate.sh
      - run: ./scripts/gates/zero_residue_negative_gate.sh
      - run: ./scripts/gates/kf_attachment_mirror_gate.sh
      - run: ./scripts/gates/secrets_pattern_gate.sh
      - run: ./scripts/gates/cargo_audit_gate.sh
      - run: ./scripts/gates/kernelkit_receipt_gate.sh
      - run: ./scripts/gates/kernelkit_audit_chain_gate.sh
      - run: ./scripts/gates/kernelkit_attestation_gate.sh
      - run: ./scripts/gates/kernelkit_verify_perf_gate.sh
  zero-residue-guard:
    name: zero-residue-guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Zero residue assertion (CI)
        run: |
          chmod +x ./scripts/security/assert_zero_residue.sh
          sudo ./scripts/security/assert_zero_residue.sh \
            --ports "17777,17778" \
            --marker "SZ_CANARY" \
            --receipt-path "docs/canary/zero_residue_receipt.ci.json" \
            --fail-on-unknown
      - name: Upload zero residue receipt
        uses: actions/upload-artifact@v4
        with:
          name: zero_residue_receipt
          path: docs/canary/zero_residue_receipt.ci.json
          if-no-files-found: error
